
<!DOCTYPE html>

<html>
<head>

<title>Register</title>

<style>

body{
    background:#f4f6f9;
    font-family:Arial,sans-serif;
}

.container{
    width:400px;
    margin:80px auto;
    background:white;
    padding:30px;
    border-radius:12px;
    box-shadow:0 4px 15px rgba(0,0,0,.1);
}

h2{
    text-align:center;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ddd;
    border-radius:6px;
}

button{
    width:100%;
    padding:12px;
    background:#007bff;
    color:white;
    border:none;
    border-radius:6px;
    cursor:pointer;
}

button:hover{
    background:#0056b3;
}

.link{
    text-align:center;
    margin-top:15px;
}

</style>

</head>

<body>

<div class="container">

```
<h2>Create Account</h2>
{% if message %}
<p style="color:red;text-align:center;">
    {{ message }}
</p>
{% endif %}

<form method="POST">

    <input
        type="text"
        name="username"
        placeholder="Username"
        required
    >

    <input
    type="password"
    name="password"
    placeholder="Password"
    required
>

<input
    type="password"
    name="confirm_password"
    placeholder="Confirm Password"
    required
>
    

    <button type="submit">
        Register
    </button>

</form>

<div class="link">
    Already have an account?
    <a href="{{ url_for('login') }}">
        Login
    </a>
</div>
```

</div>

</body>
</html>
