<!DOCTYPE html>

<html>
<head>
    <title>My Bookmarks</title>

```
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

<style>

body{
    background:#f4f6f9;
    font-family:Arial, sans-serif;
}

.page-title{
    text-align:center;
    margin:30px 0;
    color:#222;
}

.news-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
    gap:25px;
    padding:20px;
}

.card{
    background:white;
    border-radius:12px;
    overflow:hidden;
    box-shadow:0 4px 12px rgba(0,0,0,.1);
    transition:.3s;
}

.card:hover{
    transform:translateY(-5px);
}

.news-image{
    width:100%;
    height:220px;
    object-fit:cover;
}

.content{
    padding:15px;
}

.title{
    font-size:18px;
    font-weight:bold;
    margin-bottom:10px;
}

.source{
    color:#777;
    margin-bottom:15px;
}

.btn{
    padding:10px 15px;
    border:none;
    border-radius:6px;
    cursor:pointer;
    margin-right:8px;
}

.open-btn{
    background:#007bff;
    color:white;
}

.delete-btn{
    background:#dc3545;
    color:white;
}

</style>
```

</head>

<body>

<h1 class="page-title">⭐ My Saved Articles</h1>

<div class="news-grid">

{% for item in bookmarks %}

<div class="card">

```
<img src="https://images.unsplash.com/photo-1504711434969-e33886168f5c"
     class="news-image">

<div class="content">

    <div class="title">
        {{ item.title }}
    </div>

    <div class="source">
        {{ item.source }}
    </div>

    <a href="{{ item.url }}" target="_blank">
        <button class="btn open-btn">
            Read Article
        </button>
    </a>

    <a href="/delete_bookmark/{{ item.id }}">
        <button class="btn delete-btn">
            Delete
        </button>
    </a>

</div>
```

</div>

{% endfor %}

</div>

</body>
</html>
