<style>
.navbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 25px;
    background: rgba(17, 17, 17, 0.9);
    backdrop-filter: blur(10px);
    color: white;
    position: sticky;
    top: 0;
    z-index: 1000;
    box-shadow: 0 8px 20px rgba(0,0,0,0.3);
}

.logo {
    font-size: 22px;
    font-weight: bold;
    letter-spacing: 1px;
    color: #ff6f61;
}

.nav-links {
    display: flex;
    align-items: center;
    gap: 10px;
}

.nav-links a {
    color: white;
    text-decoration: none;
    padding: 8px 14px;
    border-radius: 8px;
    transition: all 0.3s ease;
    font-size: 14px;
}

.nav-links a:hover {
    background: #ff6f61;
    transform: translateY(-2px);
}

.dropdown {
    position: relative;
}

.dropdown-content {
    display: none;
    position: absolute;
    top: 40px;
    background: white;
    color: black;
    min-width: 180px;
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 10px 20px rgba(0,0,0,0.2);
}

.dropdown-content a {
    display: block;
    padding: 10px;
    color: black;
}

.dropdown-content a:hover {
    background: #f2f2f2;
}

.dropdown:hover .dropdown-content {
    display: block;
}

.auth-btn {
    background: #ff6f61;
    padding: 8px 12px;
    border-radius: 20px;
    font-weight: bold;
}

@media (max-width: 768px) {
    .nav-links {
        flex-direction: column;
        position: absolute;
        right: 10px;
        top: 60px;
        background: #1f1f2e;
        padding: 10px;
        border-radius: 10px;
    }
}
</style>

<div class="navbar">

    <div class="logo">📰 AI Powered News Digest Agent</div>

    <div class="nav-links">

        <a href="/">Home</a>

        <!-- Explore Dropdown -->
        <div class="dropdown">
            <a href="#">Explore ▼</a>
            <div class="dropdown-content">
                <a href="/home?category=technology">Technology</a>
<a href="/home?category=sports">Sports</a>
<a href="/home?category=business">Business</a>
<a href="/home?category=health">Health</a>
<a href="/home?category=science">Science</a>
            </div>
        </div>

        <a href="/trending">Trending</a>
        <a href="/bookmarks">Bookmarks</a>

        <!-- AUTH BUTTONS -->
        <a href="/login" class="auth-btn">Login</a>
        <a href="/register" class="auth-btn">Register</a>

        {% if user != "Guest" %}
<a href="/logout">Logout</a>
{% endif %}

    </div>

</div>
